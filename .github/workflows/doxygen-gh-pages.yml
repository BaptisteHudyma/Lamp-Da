name: Deploy Doc on main

permissions:
  contents: write
on:
  push:
    branches:
      - main

defaults:
  run:
    shell: bash
    working-directory: ./LampColorControler

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: DenverCoder1/doxygen-github-pages-action@v2.0.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          config_file: doxygen.conf
